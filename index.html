<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynk Studio | Memory Core</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --danger: #ef4444;
            --bg-dark: #09090b;
            --panel-bg: rgba(24, 24, 27, 0.6);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #fafafa;
            --text-muted: #a1a1aa;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            padding: 40px 20px;
            color: var(--text-main); 
            background: linear-gradient(-45deg, #09090b, #120b22, #09090b, #1a1025);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, #c4b5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 300;
        }

        .glass-panel { 
            background: var(--panel-bg); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 30px; 
            border-radius: 20px; 
            margin-bottom: 24px; 
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .glass-panel:hover {
            border-color: rgba(139, 92, 246, 0.3);
            transform: translateY(-2px);
        }

        h3 {
            margin-top: 0;
            font-size: 1.2rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        textarea, input { 
            width: 100%; 
            padding: 16px; 
            background: rgba(0, 0, 0, 0.2); 
            border: 1px solid var(--border); 
            color: #fff; 
            border-radius: 12px; 
            box-sizing: border-box; 
            margin-bottom: 16px; 
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
        }

        textarea:focus, input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
        }

        .btn-group {
            display: flex;
            gap: 12px;
        }

        button { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 0.9rem;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px rgba(139, 92, 246, 0.4);
        }

        button:hover { 
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            box-shadow: none;
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255,255,255,0.2);
        }

        .btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); box-shadow: none;}
        .btn-danger:hover { background: rgba(239, 68, 68, 0.1); color: #f87171;}

        .output { 
            background: rgba(0, 0, 0, 0.5); 
            padding: 16px; 
            border-radius: 12px; 
            font-family: 'Courier New', Courier, monospace; 
            white-space: pre-wrap; 
            margin-top: 16px; 
            color: #10b981; 
            border: 1px solid rgba(16, 185, 129, 0.2);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Zynk Studio Memory Core</h1>
            <div class="subtitle">Autonomous context retention layer powered by Cognee Cloud</div>
        </div>

        <!-- Section 1 -->
        <div class="glass-panel">
            <h3>✦ Ingest Client Requirements</h3>
            <textarea id="memoryText" rows="3" placeholder="e.g., The client wants a minimalist design with a dark theme and red accents..."></textarea>
            <div class="btn-group">
                <button onclick="saveMemory()">Sync to Knowledge Graph</button>
                <button class="btn-outline" onclick="improveMemory()">Memify (Enrich Graph)</button>
            </div>
            <div id="saveOutput" class="output" style="display:none;"></div>
        </div>

        <!-- Section 2 -->
        <div class="glass-panel">
            <h3>✦ Query Context (Recall)</h3>
            <input type="text" id="queryText" placeholder="Ask your agent anything about past projects...">
            <button onclick="queryMemory()">Traverse Neural Graph</button>
            <div id="queryOutput" class="output" style="display:none;"></div>
        </div>

        <!-- Section 3 -->
        <div class="glass-panel">
            <h3>✦ Surgically Prune Data</h3>
            <input type="text" id="forgetText" placeholder="Target dataset name to forget...">
            <button class="btn-danger" onclick="forgetMemory()">Initialize Prune Sequence</button>
            <div id="forgetOutput" class="output" style="display:none;"></div>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'https://zynk-studio-memory-core.vercel.app';

        async function saveMemory() {
            const text = document.getElementById('memoryText').value;
            const outputDiv = document.getElementById('saveOutput');
            outputDiv.style.display = 'block'; outputDiv.style.color = '#a1a1aa';
            outputDiv.innerText = 'Syncing...';
            try {
                const response = await fetch(`${BACKEND_URL}/remember`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text: text })
                });
                const data = await response.json();
                outputDiv.style.color = '#10b981'; outputDiv.innerText = JSON.stringify(data, null, 2);
            } catch (err) { outputDiv.style.color = '#ef4444'; outputDiv.innerText = 'Error: Make sure your backend (py server.py) is running!\n' + err.message; }
        }

        async function queryMemory() {
            const query = document.getElementById('queryText').value;
            const outputDiv = document.getElementById('queryOutput');
            outputDiv.style.display = 'block'; outputDiv.style.color = '#a1a1aa';
            outputDiv.innerText = 'Searching...';
            try {
                const response = await fetch(`${BACKEND_URL}/recall`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ query: query })
                });
                const data = await response.json();
                outputDiv.style.color = '#10b981'; outputDiv.innerText = JSON.stringify(data, null, 2);
            } catch (err) { outputDiv.style.color = '#ef4444'; outputDiv.innerText = 'Error: Make sure your backend (py server.py) is running!\n' + err.message; }
        }

        async function improveMemory() {
            const outputDiv = document.getElementById('saveOutput');
            outputDiv.style.display = 'block'; outputDiv.style.color = '#a1a1aa';
            outputDiv.innerText = 'Enriching...';
            try {
                const response = await fetch(`${BACKEND_URL}/improve`, { method: 'POST', headers: { 'Content-Type': 'application/json' }});
                const data = await response.json();
                outputDiv.style.color = '#10b981'; outputDiv.innerText = JSON.stringify(data, null, 2);
            } catch (err) { outputDiv.style.color = '#ef4444'; outputDiv.innerText = 'Error: Make sure your backend (py server.py) is running!\n' + err.message; }
        }

        async function forgetMemory() {
            const dataset = document.getElementById('forgetText').value;
            const outputDiv = document.getElementById('forgetOutput');
            outputDiv.style.display = 'block'; outputDiv.style.color = '#a1a1aa';
            outputDiv.innerText = 'Pruning...';
            try {
                const response = await fetch(`${BACKEND_URL}/forget`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ dataset_name: dataset })
                });
                const data = await response.json();
                outputDiv.style.color = '#10b981'; outputDiv.innerText = JSON.stringify(data, null, 2);
            } catch (err) { outputDiv.style.color = '#ef4444'; outputDiv.innerText = 'Error: Make sure your backend (py server.py) is running!\n' + err.message; }
        }
    </script>
</body>
</html>
