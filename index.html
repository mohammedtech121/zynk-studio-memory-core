<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynk Studio | Memory Core</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --danger: #ef4444;
            --bg-dark: #09090b;
            --panel-bg: rgba(24, 24, 27, 0.6);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #fafafa;
            --text-muted: #a1a1aa;
        }
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 40px 20px; color: var(--text-main); background: linear-gradient(-45deg, #09090b, #120b22, #09090b, #1a1025); background-size: 400% 400%; animation: gradientBG 15s ease infinite; min-height: 100vh; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .container { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 50px; }
        h1 { font-size: 2.8rem; font-weight: 800; margin-bottom: 10px; background: linear-gradient(to right, #fff, #c4b5fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: var(--text-muted); font-size: 1.1rem; }
        .glass-panel { background: var(--panel-bg); backdrop-filter: blur(16px); padding: 30px; border-radius: 20px; margin-bottom: 24px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3); }
        h3 { font-size: 1.2rem; color: #fff; margin-bottom: 20px; }
        textarea, input { width: 100%; padding: 16px; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--border); color: #fff; border-radius: 12px; margin-bottom: 16px; font-family: 'Inter', sans-serif; }
        button { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        button:hover { background: var(--primary-hover); }
        .btn-outline { background: transparent; border: 1px solid var(--border); }
        .btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
        .output { background: rgba(0, 0, 0, 0.5); padding: 16px; border-radius: 12px; white-space: pre-wrap; margin-top: 16px; color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); font-size: 0.85rem; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Zynk Studio Memory Core</h1>
            <div class="subtitle">Autonomous context retention layer powered by Cognee Cloud</div>
        </div>

        <div class="glass-panel">
            <h3>✦ Ingest Client Requirements</h3>
            <textarea id="memoryText" rows="3" placeholder="Enter client requirements..."></textarea>
            <div style="display:flex; gap:10px;">
                <button onclick="saveMemory()">Sync to Knowledge Graph</button>
                <button class="btn-outline" onclick="improveMemory()">Memify</button>
            </div>
            <div id="saveOutput" class="output"></div>
        </div>

        <div class="glass-panel">
            <h3>✦ Query Context (Recall)</h3>
            <input type="text" id="queryText" placeholder="Ask your agent anything...">
            <button onclick="queryMemory()">Traverse Neural Graph</button>
            <div id="queryOutput" class="output"></div>
        </div>

        <div class="glass-panel">
            <h3>✦ Surgically Prune Data</h3>
            <input type="text" id="forgetText" placeholder="Dataset name to forget...">
            <button class="btn-danger" onclick="forgetMemory()">Initialize Prune Sequence</button>
            <div id="forgetOutput" class="output"></div>
        </div>
    </div>

    <script>
    const BACKEND_URL = 'https://zynk-studio-memory-core.onrender.com';

    async function apiCall(endpoint, payload, outputId) {
        const outputDiv = document.getElementById(outputId);
        outputDiv.style.display = 'block';
        outputDiv.innerText = 'Processing...';
        try {
            const response = await fetch(`${BACKEND_URL}${endpoint}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            outputDiv.innerText = data.message || data.answer || "Success!";
        } catch (err) {
            outputDiv.innerText = "Error connecting to backend.";
        }
    }

    function saveMemory() { apiCall('/remember', {text: document.getElementById('memoryText').value}, 'saveOutput'); }
    function improveMemory() { apiCall('/memify', {}, 'saveOutput'); }
    function queryMemory() { apiCall('/query', {query: document.getElementById('queryText').value}, 'queryOutput'); }
    function forgetMemory() { apiCall('/forget', {dataset: document.getElementById('forgetText').value}, 'forgetOutput'); }
    </script>
</body>
</html>
